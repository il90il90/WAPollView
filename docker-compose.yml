services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-polluser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pollpass_secure_2024}
      POSTGRES_DB: ${POSTGRES_DB:-whatsapp_polls}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-polluser} -d ${POSTGRES_DB:-whatsapp_polls}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://polluser:pollpass_secure_2024@postgres:5432/whatsapp_polls}
      NODE_ENV: production
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    volumes:
      - ./auth_info:/app/auth_info
    ports:
      - "${BACKEND_PORT:-3002}:3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  pg_data:
